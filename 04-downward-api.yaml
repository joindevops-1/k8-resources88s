apiVersion: v1
kind: Pod
metadata:
  name: nginx-downwardapi
  namespace: default
  labels:
    app: nginx
    env: demo
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "250m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "128Mi"

      # podIP and nodeName only work as env vars
      env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

      volumeMounts:
        - name: pod-info        # must match volume name below
          mountPath: /etc/podinfo

  volumes:
    - name: pod-info            # must match volumeMounts name above
      downwardAPI:
        items:
          - path: "pod-name"
            fieldRef:
              fieldPath: metadata.name
          - path: "pod-namespace"
            fieldRef:
              fieldPath: metadata.namespace
          - path: "pod-uid"
            fieldRef:
              fieldPath: metadata.uid
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
          - path: "annotations"
            fieldRef:
              fieldPath: metadata.annotations
          - path: "cpu-limit"
            resourceFieldRef:
              containerName: app
              resource: limits.cpu
          - path: "memory-limit"
            resourceFieldRef:
              containerName: app
              resource: limits.memory